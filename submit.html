<!DOCTYPE html>

<html>

<head>
    <title>
        Newer GD team
    </title>

    <style>
        h1 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: brown;
            margin: auto;
        }
        
        p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        h2 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: auto;
        }
        
        body {
            margin: 0;
            background: repeating-linear-gradient( 75deg, #cdcdcd, #cdcdcd 25px, azure 25px, azure 50px);
        }
        
        .navigation {
            width: 100%;
            height: 80px;
            background-color: aquamarine;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
        }
        
        .box {
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        
        .logo {
            height: 80%;
            width: auto;
            display: block;
        }
        
        .box:hover {
            background-color: aqua;
        }
        
        .text {
            display: flex;
            align-items: center;
        }
        
        .socials {
            display: flex;
            align-items: center;
            flex-direction: column;
            position: fixed;
            top: 100px
        }
        
        .image {
            background-color: aquamarine;
            border: 3px solid black;
            padding-right: 10px;
            max-width: 80px;
        }
        
        .image:hover {
            background-color: aqua;
        }
        
        .post {
            width: 75%;
            height: 200px;
            resize: none;
            margin: auto;
            display: block;
        }
    </style>
</head>

<body>

    <div class="navigation">
        <div class="box">
            <img src="./assets/newer.png" height="115%">
        </div>
        <div class="box" onclick="window.location.href = 'index.html'">
            <p><b>About</b></p>
        </div>
        <div class="box" onclick="window.location.href = 'https://discord.gg/9YKJ6qPXvf'">
            <p><b>Discord server</b></p>

        </div>
        <div class="box" onclick="window.location.href = 'partners.html'">
            <p><b>Our partners</b></p>

        </div>

        <div class="box" onclick="window.location.href = 'suggestions.html'">
            <p><b>Give us your feedback</b></p>

        </div>
    </div>

    <p><br><br><br><br></p>

    <textarea placeholder="Write your feedback here..." id="post" class="post"></textarea>

    <div class="image" onclick="send()">
        <h2>Post</h2>
    </div>

    <div class="image" onclick="exitpage()">
        <h2>Cancel</h2>
    </div>


    <div class="socials">
        <div class="image" onclick="window.location.href='https://www.youtube.com/@NewerGD'">
            <img src="assets/yt.png" height="50px">
        </div>
        <div class="image" onclick="window.location.href='https://www.tiktok.com/@newer.gd'">
            <img src="assets/tt.png" height="50px">
        </div>
        <div class="image" onclick="window.location.href='https://discord.gg/9YKJ6qPXvf'">
            <img src="assets/dc.png" height="50px">
        </div>
    </div>


    <script>
        async function submit() {
            const text = document.getElementById("post").value;

            await fetch("https://suggestions-worker.krolkrolf.workers.dev/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "text": text
                })
            });
        }

        function exitpage() {
            window.location.href = 'suggestions.html'
        }

        function send() {
            const text = document.getElementById("post").value;
            console.log(text);
            submit()

            setTimeout(exitpage, 1000)
        }
    </script>

</body>

</html>
