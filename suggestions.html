<!DOCTYPE html>

<html>

<head>
    <title>
        Newer GD team
    </title>

    <style>
        h1 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: brown;
            margin: auto;
        }
        
        p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        h2 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: auto;
        }
        
        body {
            margin: 0;
            background: repeating-linear-gradient( 75deg, #cdcdcd, #cdcdcd 25px, azure 25px, azure 50px);
        }
        
        .navigation {
            width: 100%;
            height: 80px;
            background-color: aquamarine;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
        }
        
        .box {
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        
        .logo {
            height: 80%;
            width: auto;
            display: block;
        }
        
        .box:hover {
            background-color: aqua;
        }
        
        .text {
            display: flex;
            align-items: center;
        }
        
        .socials {
            display: flex;
            align-items: center;
            flex-direction: column;
            position: fixed;
            top: 100px
        }
        
        .image {
            background-color: aquamarine;
            border: 3px solid black;
            padding-right: 10px;
            max-width: 40px;
        }
        
        .image:hover {
            background-color: aqua;
        }
        
        .suggestions {
            width: 75%;
            background-color: white;
            margin: auto;
        }
        
        .suggestion {
            width: 100%;
            margin: auto;
            border-width: 3px;
            border-color: black;
            border-style: solid;
        }
    </style>
</head>

<body>
    <div class="navigation">
        <div class="box">
            <img src="./assets/newer.png" height="115%">
        </div>
        <div class="box" onclick="window.location.href = 'index.html'">
            <p><b>About</b></p>
        </div>
        <div class="box" onclick="window.location.href = 'https://discord.gg/9YKJ6qPXvf'">
            <p><b>Discord server</b></p>

        </div>
        <div class="box" onclick="window.location.href = 'partners.html'">
            <p><b>Our partners</b></p>

        </div>
    </div>

    <p><br><br><br><br><br></p>

    <div class="suggestions" id="sug">
    </div>

    <p><br><br><br><br><br><br><br><br></p>

    <input type="number" id="page" placeholder="page number" style="height: 30px; width: 100px;">
    <div class="image" style="height: 50px; width: 50px; display: flex; justify-content: center;" onclick="buttonClick()">
        <h2 style="margin: auto;">GO</h2>
    </div>

    <div class="socials">
        <div class="image" onclick="window.location.href='https://www.youtube.com/@NewerGD'">
            <img src="assets/yt.png" height="50px">
        </div>
        <div class="image" onclick="window.location.href='https://www.tiktok.com/@newer.gd'">
            <img src="assets/tt.png" height="50px">
        </div>
        <div class="image" onclick="window.location.href='https://discord.gg/9YKJ6qPXvf'">
            <img src="assets/dc.png" height="50px">
        </div>
    </div>


    <script>
        const suggestions = document.getElementById("sug");

        async function load(url) {
            const res = await fetch(url);
            const data = await res.json();
            console.log(data);
            return data;
        }

        async function init() {
            data = await load("https://suggestions-worker.krolkrolf.workers.dev?page=0");

            for (item in data) {
                const sug = document.createElement("div");
                sug.className = "suggestion";
                sug.innerHTML = "<h2>" + data[item].text + "</h2>";
                sug.id = "s" + item;
                suggestions.appendChild(sug);
            }
        }

        // Call the async function
        init();

        async function buttonClick() {
            input = document.getElementById('page');
            page = input.value;
            data = await load("https://suggestions-worker.krolkrolf.workers.dev?page=" + page);
            suggestions.replaceChildren()

            for (item in data) {
                const sug = document.createElement("div");
                sug.className = "suggestion";
                sug.innerHTML = "<h2>" + (data[item].text ? data[item].text : "") + "</h2>";
                sug.id = "s" + item;
                suggestions.appendChild(sug);
            }

        }
    </script>

</body>

</html>
